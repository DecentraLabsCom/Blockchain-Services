# Development overrides (auto-loaded by Docker Compose when present).
# For production, use docker-compose.prod.yml instead.

services:
  blockchain-services:
    ports:
      - "${BLOCKCHAIN_HTTP_PORT:-8080}:8080"
    environment:
      - ADMIN_DASHBOARD_LOCAL_ONLY=${BCHAIN_ADMIN_DASHBOARD_LOCAL_ONLY:-true}
      - ADMIN_DASHBOARD_ALLOW_PRIVATE=${BCHAIN_ADMIN_DASHBOARD_ALLOW_PRIVATE:-true}
      - SECURITY_ALLOW_PRIVATE_NETWORKS=${BCHAIN_SECURITY_ALLOW_PRIVATE_NETWORKS:-true}
      - ADMIN_ACCESS_TOKEN=${ADMIN_ACCESS_TOKEN:-}
      - ADMIN_ACCESS_TOKEN_HEADER=${ADMIN_ACCESS_TOKEN_HEADER:-X-Access-Token}
      - ADMIN_ACCESS_TOKEN_COOKIE=${ADMIN_ACCESS_TOKEN_COOKIE:-access_token}
      - ADMIN_ACCESS_TOKEN_REQUIRED=${ADMIN_ACCESS_TOKEN_REQUIRED:-false}
